<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algorithm Planner</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Algorithm Planner</h1>
      <div class="sub" id="headerSub"></div>
    </header>

    <main>
      <section class="panel">
        <div class="kpis">
          <div class="kpi"><div class="v" id="readiness">-</div><div class="l">Roadmap Progress</div></div>
          <div class="kpi"><div class="v" id="foundationCoverage">-</div><div class="l">Foundation Coverage</div></div>
          <div class="kpi"><div class="v" id="hoursGap">-</div><div class="l">Hours Since Study</div></div>
          <div class="kpi"><div class="v" id="dueProblems">-</div><div class="l">Reviews Due</div></div>
          <div class="kpi"><div class="v" id="windowState">-</div><div class="l">Learning Window</div></div>
        </div>

        <h3>Ordinea de lucru</h3>
        <div id="roadmapPhases" class="roadmap"></div>

        <h3>Checklist pe categorii</h3>
        <div class="save-state" id="saveState">Saved</div>
        <div id="categoriesRoot"></div>

        <details id="hiddenTheory" class="theory"></details>
      </section>

      <section class="panel coach">
        <h3>AI Coach (pe problema)</h3>

        <div id="reminders"></div>

        <label>Problema</label>
        <select id="conceptId"></select>

        <label>Confidence (0-100)</label>
        <input id="confidence" type="number" min="0" max="100" value="60" />

        <label>Ce ai retinut?</label>
        <textarea id="recallAnswer" placeholder="Pattern, complexitate, edge cases, trade-offs."></textarea>

        <label>Session summary</label>
        <textarea id="summary" placeholder="Ce ai rezolvat, ce a mers greu, ce urmeaza."></textarea>

        <button id="sendCheckin">Send to AI Coach</button>
        <button id="requestNotif" class="secondary">Enable Browser Notifications</button>

        <div class="feedback" id="feedbackBox">
          <strong>AI feedback will appear here.</strong>
        </div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
